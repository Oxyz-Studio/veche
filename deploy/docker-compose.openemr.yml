services:
  mysql:
    image: mariadb:10.6
    command: ['mariadbd', '--character-set-server=utf8mb4']
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - openemr_db:/var/lib/mysql

  openemr:
    image: openemr/openemr:7.0.2
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - mysql
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASS: root
      MYSQL_USER: openemr
      MYSQL_PASS: openemr
      OE_USER: admin
      OE_PASS: pass
    volumes:
      - openemr_sites:/var/www/localhost/htdocs/openemr/sites

volumes:
  openemr_db:
  openemr_sites:
